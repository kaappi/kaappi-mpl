name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Kaappi
        run: |
          gh release download --repo kaappi/kaappi --pattern "kaappi-x86_64-linux" --output /tmp/kaappi
          gh release download --repo kaappi/kaappi --pattern "kaappi-lib.tar.gz" --output /tmp/kaappi-lib.tar.gz
          chmod +x /tmp/kaappi
          mkdir -p /tmp/kaappi-home
          tar xzf /tmp/kaappi-lib.tar.gz -C /tmp/kaappi-home
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run tests
        run: /tmp/kaappi --coverage-xml coverage.xml --lib-path lib tests/test-mpl.scm
        env:
          KAAPPI_HOME: /tmp/kaappi-home

      - name: Upload to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          fail_ci_if_error: false
